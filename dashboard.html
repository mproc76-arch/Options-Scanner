<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Options Scanner</title>
<style>
:root {
  --bg:#0f0f0f;--bg2:#181818;--bg3:#222;--border:#2a2a2a;
  --text:#e8e8e8;--muted:#777;
  --green:#2ecc71;--green-bg:#0d2b1a;
  --amber:#f0a500;--amber-bg:#2b1f00;
  --red:#e74c3c;--red-bg:#2b0d0d;
  --blue:#4a9eff;--blue-bg:#0d1e2b;
  --purple:#9b8cf7;--purple-bg:#1a1630;
  --radius:10px;--font:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px}
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:var(--bg2);border-bottom:1px solid var(--border)}
.header h1{font-size:17px;font-weight:600}
.header .sub{font-size:12px;color:var(--muted);margin-top:2px}
.header-right{display:flex;align-items:center;gap:12px}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
.status-dot.scanning{background:var(--amber)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.last-scan{font-size:12px;color:var(--muted)}
.refresh-btn{font-size:12px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--text);cursor:pointer}
.refresh-btn:hover{border-color:var(--blue);color:var(--blue)}
.briefing{padding:14px 24px 16px;background:var(--bg2);border-bottom:1px solid var(--border)}
.section-lbl{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.briefing-grid{display:grid;grid-template-columns:repeat(4,1fr) 1.2fr;gap:10px}
.brief-card{background:var(--bg3);border:1px solid var(--border);border-left:3px solid var(--border);border-radius:var(--radius);padding:12px 14px}
.brief-card.bull{border-left-color:var(--green)}
.brief-card.bear{border-left-color:var(--red)}
.brief-card.warn{border-left-color:var(--amber)}
.brief-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.brief-price{font-size:20px;font-weight:700}
.brief-chg{font-size:12px;font-weight:500;margin-top:2px}
.chg-up{color:var(--green)}.chg-down{color:var(--red)}
.brief-meta{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.6}
.bias-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px}
.bias-val{font-size:17px;font-weight:700;margin:4px 0 3px}
.bias-bull{color:var(--green)}.bias-bear{color:var(--red)}.bias-warn{color:var(--amber)}
.bias-sub{font-size:11px;color:var(--muted);line-height:1.6}
.alert-bar{padding:10px 24px;border-bottom:1px solid var(--border);display:none}
.alert-bar.visible{display:block}
.alert-section-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.alert-chips{display:flex;flex-wrap:wrap;gap:5px}
.alert-chip{font-size:11px;padding:3px 10px;border-radius:20px;white-space:nowrap}
.chip-red{background:#2b0d0d;border:1px solid #5a1a1a;color:var(--red)}
.chip-amber{background:#2b1f00;border:1px solid #5a3e00;color:var(--amber)}
.tabs{display:flex;padding:0 24px;background:var(--bg2);border-bottom:1px solid var(--border)}
.tab{padding:10px 16px;font-size:13px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:var(--text);border-bottom-color:var(--blue)}
.tab:hover:not(.active){color:var(--text)}
.main{padding:20px 24px}
.panel{display:none}.panel.active{display:block}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.stat-val{font-size:24px;font-weight:600}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.05em}
.cards{display:flex;flex-direction:column;gap:10px}
.card{background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .15s}
.card:hover{border-color:#3a3a3a}
.card.leaps-card{border-left-color:var(--purple)}
.card.put-card{border-left-color:var(--amber)}
.card-main{display:grid;grid-template-columns:64px 1fr auto;gap:14px;align-items:start;padding:16px}
.score-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.score-circle{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;border:2px solid}
.score-high{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.score-mid{background:var(--amber-bg);border-color:var(--amber);color:var(--amber)}
.score-low{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.score-type{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;text-align:center;margin-top:2px}
.card-ticker{font-size:18px;font-weight:700}
.card-contract{font-size:12px;color:var(--muted);margin-top:3px}
.card-stats{display:flex;gap:16px;margin-top:8px;flex-wrap:wrap}
.card-stat .val{font-weight:600;color:var(--text)}
.card-stat .lbl{color:var(--muted);font-size:12px}
.signals-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px}
.sig{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.sig-bull{background:var(--green-bg);color:var(--green);border:1px solid #1a4d30}
.sig-bear{background:var(--red-bg);color:var(--red);border:1px solid #4d1a1a}
.card-actions{display:flex;flex-direction:column;gap:6px;align-items:flex-end}
.action-btn{font-size:11px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--text);cursor:pointer;white-space:nowrap}
.action-btn:hover{border-color:var(--blue);color:var(--blue)}
.action-btn.primary{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}
.news-toggle{font-size:11px;color:var(--blue);cursor:pointer;background:none;border:none;padding:0;margin-top:8px;display:block}
.news-toggle:hover{text-decoration:underline}
.card-news{border-top:1px solid var(--border);padding:12px 16px;background:#141414;display:none}
.card-news.open{display:block}
.news-hdr{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.news-item{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid #1e1e1e}
.news-item:last-child{border-bottom:none}
.news-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px;background:var(--muted)}
.news-dot.bull{background:var(--green)}.news-dot.bear{background:var(--red)}
.news-text{font-size:12px;color:var(--text);flex:1;line-height:1.5}
.news-time{font-size:11px;color:var(--muted);white-space:nowrap;flex-shrink:0}
.news-empty{font-size:12px;color:var(--muted);font-style:italic}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-title{font-size:16px;margin-bottom:8px;color:var(--text)}
.loading-bar{height:2px;background:var(--blue);width:0%;transition:width .5s;position:fixed;top:0;left:0;z-index:999}
.sig-warn{background:#2b1f00;color:var(--amber);border:1px solid #5a3e00}
.cushion{font-size:11px;color:var(--muted);margin-top:6px}
.cushion .ok{color:var(--green)}.cushion .caution{color:var(--amber)}.cushion .danger{color:var(--red)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:1000}
.modal-overlay.open{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:340px;max-width:92vw}
.modal-title{font-size:15px;font-weight:600;margin-bottom:5px}
.modal-desc{font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.5}
.modal-field{margin-bottom:12px}
.modal-field label{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.modal-field input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-size:13px;outline:none}
.modal-field input:focus{border-color:var(--blue)}
.modal-row{display:flex;gap:8px;margin-top:16px}
.modal-row button{flex:1;padding:9px;border-radius:6px;font-size:13px;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text)}
.modal-row .primary{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}
.pos-empty{text-align:center;padding:50px 20px;color:var(--muted);font-size:13px;line-height:1.8}
.pos-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px}
.pos-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.pos-ticker{font-size:17px;font-weight:700}
.pos-badge{font-size:10px;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em}
.leaps-badge{background:var(--purple-bg);color:var(--purple);border:1px solid #3a2d8a}
.put-badge{background:var(--amber-bg);color:var(--amber);border:1px solid #5a3e00}
.pos-meta{font-size:12px;color:var(--muted)}
.pos-stats{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:10px}
.pos-stat .lbl{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.04em}
.pos-stat .val{font-size:12px;font-weight:500;margin-top:2px}
.pos-alert-scale{font-size:12px;padding:6px 10px;border-radius:6px;background:var(--green-bg);color:var(--green);border:1px solid #1a4d30;margin-bottom:8px}
.pos-alert-roll{font-size:12px;padding:6px 10px;border-radius:6px;background:var(--amber-bg);color:var(--amber);border:1px solid #5a3e00;margin-bottom:8px}
.pos-footer{display:flex;justify-content:flex-end;margin-top:6px}
.pos-remove{font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;padding:2px 0}
.pos-remove:hover{color:var(--red)}
</style>
</head>
<body>
<div class="loading-bar" id="loading-bar"></div>

<div class="header">
  <div>
    <h1>Options Scanner</h1>
    <div class="sub" id="header-sub">Loading...</div>
  </div>
  <div class="header-right">
    <div class="status-dot" id="status-dot"></div>
    <div class="last-scan" id="last-scan"></div>
    <button class="refresh-btn" onclick="triggerRescan()">Rescan now</button>
  </div>
</div>

<div class="briefing">
  <div class="section-lbl">Morning Market Briefing</div>
  <div class="briefing-grid" id="briefing-grid">
    <div class="brief-card"><div class="brief-lbl">Loading...</div></div>
    <div class="brief-card"><div class="brief-lbl">Loading...</div></div>
    <div class="brief-card"><div class="brief-lbl">Loading...</div></div>
    <div class="brief-card"><div class="brief-lbl">Loading...</div></div>
    <div class="bias-card"><div class="brief-lbl">Market Bias</div><div class="bias-val" id="bias-val">--</div><div class="bias-sub" id="bias-sub">Fetching data...</div></div>
  </div>
</div>

<div class="alert-bar" id="alert-bar">
  <div class="alert-section-lbl" id="alert-lbl" style="color:var(--amber)">Alerts</div>
  <div class="alert-chips" id="alert-chips"></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('leaps',this)">LEAPS calls</div>
  <div class="tab" onclick="showTab('puts',this)">Naked puts</div>
  <div class="tab" onclick="showTab('positions',this)">Positions</div>
</div>

<div class="main">
  <div class="stats-row">
    <div class="stat"><div class="stat-val" id="stat-leaps" style="color:var(--purple)">--</div><div class="stat-lbl">LEAPS Setups</div></div>
    <div class="stat"><div class="stat-val" id="stat-puts" style="color:var(--amber)">--</div><div class="stat-lbl">Put Setups</div></div>
    <div class="stat"><div class="stat-val" id="stat-alerts" style="color:var(--red)">--</div><div class="stat-lbl">Alerts</div></div>
    <div class="stat"><div class="stat-val" id="stat-watch" style="color:var(--blue)">--</div><div class="stat-lbl">Tickers Scanned</div></div>
  </div>
  <div class="panel active" id="panel-leaps"><div class="cards" id="cards-leaps"></div></div>
  <div class="panel" id="panel-puts"><div class="cards" id="cards-puts"></div></div>
  <div class="panel" id="panel-positions"><div class="cards" id="cards-positions"></div></div>
</div>

<script>
function showTab(id,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-'+id).classList.add('active');
  if(id==='positions')loadPositions();
}
function scoreClass(s){return s>=75?'score-high':s>=60?'score-mid':'score-low';}
function num(n,d){return typeof n==='number'?n.toFixed(d):String(n);}

// BRIEFING
var BRIEF=[
  {sym:'SPY',   label:'SPY - S&P 500'},
  {sym:'QQQ',   label:'QQQ - Nasdaq'},
  {sym:'%5EVIX',label:'VIX - Volatility'},
  {sym:'IWM',   label:'IWM - Russell 2000'},
];

async function loadBriefing(){
  var grid=document.getElementById('briefing-grid');
  var bullCount=0,bearCount=0,vixPrice=20;
  var results=[];
  for(var i=0;i<BRIEF.length;i++){
    var t=BRIEF[i];
    try{
      var resp=await fetch('/quote?ticker='+t.sym);
      var d=await resp.json();
      results.push(Object.assign({},t,d));
      if(t.sym==='%5EVIX'){vixPrice=d.price||20;}
      else if(d.chg_pct>0){bullCount++;}
      else{bearCount++;}
    }catch(e){
      results.push(Object.assign({},t,{price:'--',chg_pct:0,chg:0,above_50ma:null,rsi:null}));
    }
  }
  grid.innerHTML='';
  for(var i=0;i<results.length;i++){
    var r=results[i];
    var isVix=r.sym==='%5EVIX';
    var up=r.chg_pct>0;
    var cardCls=isVix?(r.price>25?'bear':r.price>18?'warn':'bull'):(up?'bull':'bear');
    var maStr=r.above_50ma===true?'Above 50 MA':r.above_50ma===false?'Below 50 MA':'';
    var rsiStr=r.rsi?'RSI '+r.rsi:'';
    var meta=[maStr,rsiStr].filter(Boolean).join(' | ');
    var div=document.createElement('div');
    div.className='brief-card '+cardCls;
    div.innerHTML=
      '<div class="brief-lbl">'+r.label+'</div>'+
      '<div class="brief-price">$'+num(r.price,2)+'</div>'+
      '<div class="brief-chg '+(up?'chg-up':'chg-down')+'">'+
        (up?'(+)':'(-)')+' '+Math.abs(r.chg_pct).toFixed(2)+'% ('+
        (up?'+':'')+num(r.chg,2)+
      ')</div>'+
      (meta?'<div class="brief-meta">'+meta+'</div>':'');
    grid.appendChild(div);
  }
  // bias card
  var bias,biasCls,biasSub;
  if(bullCount>=3&&vixPrice<20){
    bias='Risk-on';biasCls='bias-bull';
    biasSub='VIX '+num(vixPrice,1)+' - Market trending up, volatility low. Good environment for LEAPS entries.';
  }else if(bearCount>=3||vixPrice>28){
    bias='Risk-off';biasCls='bias-bear';
    biasSub='VIX '+num(vixPrice,1)+' - Market under pressure or fear elevated. Reduce size, manage positions first.';
  }else{
    bias='Caution';biasCls='bias-warn';
    biasSub='VIX '+num(vixPrice,1)+' - Mixed signals. Trade selectively, highest conviction setups only.';
  }
  var bc=document.createElement('div');
  bc.className='bias-card';
  bc.innerHTML=
    '<div class="brief-lbl">Market Bias</div>'+
    '<div class="bias-val '+biasCls+'">'+bias+'</div>'+
    '<div class="bias-sub">'+biasSub+'</div>';
  grid.appendChild(bc);
}

// NEWS
var newsCache={};
async function toggleNews(ticker,newsId,btn){
  var el=document.getElementById(newsId);
  var open=el.classList.toggle('open');
  btn.textContent=open?'Hide news':'Show news and catalysts';
  if(!open)return;
  if(newsCache[ticker]){renderNews(el,newsCache[ticker]);return;}
  el.innerHTML='<div class="news-hdr">Recent News and Catalysts</div><div class="news-empty">Loading...</div>';
  try{
    var resp=await fetch('/news?ticker='+encodeURIComponent(ticker));
    var data=await resp.json();
    newsCache[ticker]=data.news||[];
    renderNews(el,newsCache[ticker]);
  }catch(e){
    el.innerHTML='<div class="news-hdr">Recent News and Catalysts</div><div class="news-empty">Could not load news</div>';
  }
}
function renderNews(el,items){
  if(!items||!items.length){
    el.innerHTML='<div class="news-hdr">Recent News and Catalysts</div><div class="news-empty">No recent headlines found</div>';
    return;
  }
  var html='<div class="news-hdr">Recent News and Catalysts</div>';
  for(var i=0;i<Math.min(items.length,6);i++){
    var n=items[i];
    var dotCls=n.sentiment==='bull'?'bull':n.sentiment==='bear'?'bear':'';
    var title=n.title||'';
    var timeStr=n.time||'';
    html+='<div class="news-item">'+
      '<div class="news-dot '+dotCls+'"></div>'+
      '<div class="news-text">'+title+'</div>'+
      '<div class="news-time">'+timeStr+'</div>'+
      '</div>';
  }
  el.innerHTML=html;
}

// CARD
function renderCard(item){
  var c=item.contract||{};
  var typeCls=item.trade_type==='LEAPS call'?'leaps-card':'put-card';
  var typeLabel=item.trade_type==='LEAPS call'?'LEAPS':'PUT';
  var sc=scoreClass(item.score);
  var newsId='news-'+item.ticker+'-'+item.trade_type.replace(/\s/g,'');
  var ivr=typeof item.iv_rank==='number'?item.iv_rank.toFixed(1):'--';
  var rsiColor=item.rsi>70?'var(--red)':item.rsi<35?'var(--green)':'var(--text)';
  var hasContract=c.strike&&c.strike!=='--'&&c.strike!=='\u2014'&&c.strike!=='&mdash;';
  var contractStr=hasContract?
    c.strike+(item.trade_type==='LEAPS call'?'C':'P')+' | '+c.exp+' | DTE '+c.dte+' | Delta '+c.delta+' | Mid $'+c.mid:
    'Contract data loads on market open (Mon-Fri)';
  var bullTags=(item.bull_signals||[]).slice(0,6).map(function(s){
    return '<span class="sig sig-bull">'+s+'</span>';}).join('');
  var bearTags=(item.bear_signals||[]).slice(0,3).map(function(s){
    return '<span class="sig sig-bear">'+s+'</span>';}).join('');
  var earningsTag=item.earnings_warning?'<span class="sig sig-warn">Earnings '+item.earnings_warning+' within DTE — enter after?</span>':'';
  var ma200row=item.ma200?
    '<div class="card-stat"><span class="val">$'+item.ma200+'</span> <span class="lbl">200 MA</span></div>':'';
  var cushionHtml='';
  if(item.support_cushion){
    var cush=item.support_cushion;
    var cushCls=cush.pct>=5?'ok':cush.pct>=2?'caution':'danger';
    cushionHtml='<div class="cushion">Support: '+cush.level+' $'+cush.price+' — <span class="'+cushCls+'">$'+cush.dollar+' / '+cush.pct+'% below strike</span></div>';
  }
  var strikeArg=hasContract?'\''+c.strike+'\'':'\'--\'';
  var expArg=hasContract?'\''+c.exp+'\'':'\'--\'';
  var midArg=hasContract?'\''+c.mid+'\'':'\'--\'';

  return '<div class="card '+typeCls+'">'+
    '<div class="card-main">'+
      '<div class="score-wrap">'+
        '<div class="score-circle '+sc+'">'+item.score+'%</div>'+
        '<div class="score-type">'+typeLabel+'</div>'+
      '</div>'+
      '<div>'+
        '<div class="card-ticker">'+item.ticker+'</div>'+
        '<div class="card-contract">'+contractStr+'</div>'+
        '<div class="card-stats">'+
          '<div class="card-stat"><span class="val">$'+item.price+'</span> <span class="lbl">price</span></div>'+
          '<div class="card-stat"><span class="val" style="color:'+rsiColor+'">'+item.rsi+'</span> <span class="lbl">RSI</span></div>'+
          '<div class="card-stat"><span class="val">'+ivr+'</span> <span class="lbl">IVR</span></div>'+
          '<div class="card-stat"><span class="val">'+item.vol_ratio+'x</span> <span class="lbl">vol</span></div>'+
          '<div class="card-stat"><span class="val">$'+item.ma20+'</span> <span class="lbl">20 MA</span></div>'+
          '<div class="card-stat"><span class="val">$'+item.ma50+'</span> <span class="lbl">50 MA</span></div>'+
          ma200row+
        '</div>'+
        '<div class="signals-row">'+bullTags+bearTags+earningsTag+'</div>'+
        cushionHtml+
        '<button class="news-toggle" onclick="toggleNews(\''+item.ticker+'\',\''+newsId+'\',this)">Show news and catalysts</button>'+
      '</div>'+
      '<div class="card-actions">'+
        '<button class="action-btn primary" onclick="analyzeCard(\''+item.ticker+'\',\''+item.trade_type+'\','+item.score+','+item.rsi+','+(typeof item.iv_rank==='number'?item.iv_rank:0)+')">Analyze</button>'+
        '<button class="action-btn" onclick="openLogModal(\''+item.ticker+'\',\''+item.trade_type+'\','+strikeArg+','+expArg+','+midArg+')">Log trade</button>'+
      '</div>'+
    '</div>'+
    '<div class="card-news" id="'+newsId+'"></div>'+
  '</div>';
}

function analyzeCard(ticker,type,score,rsi,ivr){
  var msg='Analyze '+ticker+' for a '+type+'.\n\nScanner data:\n- Score: '+score+'%\n- RSI: '+rsi+'\n- IV Rank: '+ivr+'\n\nPlease walk me through:\n1. Is now a good entry?\n2. What are the key price levels to watch?\n3. What would invalidate this trade?\n4. What is the ideal exit plan?';
  if(navigator.clipboard){
    navigator.clipboard.writeText(msg).then(function(){
      alert('Analysis prompt copied! Paste it into a new Claude chat.');
    }).catch(function(){prompt('Copy this into Claude:',msg);});
  }else{
    prompt('Copy this into Claude:',msg);
  }
}

// ALERTS
function renderAlerts(alerts){
  var bar=document.getElementById('alert-bar');
  var chips=document.getElementById('alert-chips');
  var lbl=document.getElementById('alert-lbl');
  if(!alerts||!alerts.length){bar.classList.remove('visible');return;}
  bar.classList.add('visible');
  var bearAlerts=alerts.filter(function(a){
    return a.msg.toLowerCase().indexOf('bearish')>=0||a.msg.toLowerCase().indexOf('death')>=0;
  });
  var amberAlerts=alerts.filter(function(a){return bearAlerts.indexOf(a)<0;});
  var hasBear=bearAlerts.length>0;
  bar.style.background=hasBear?'#1a0a0a':'#1a1400';
  lbl.textContent=hasBear?'Caution - Bearish signals detected':'Watch - RSI alerts';
  lbl.style.color=hasBear?'var(--red)':'var(--amber)';
  chips.innerHTML=
    bearAlerts.map(function(a){return '<div class="alert-chip chip-red">'+a.ticker+': '+a.msg+'</div>';}).join('')+
    amberAlerts.map(function(a){return '<div class="alert-chip chip-amber">'+a.ticker+': '+a.msg+'</div>';}).join('');
}

// RENDER
function render(data){
  if(!data)return;
  document.getElementById('last-scan').textContent=data.last_scan?'Last scan: '+data.last_scan:'';
  document.getElementById('header-sub').textContent=(data.watchlist_count||0)+' tickers | refreshes every 15 min';
  document.getElementById('stat-leaps').textContent=data.leaps?data.leaps.length:'--';
  document.getElementById('stat-puts').textContent=data.puts?data.puts.length:'--';
  document.getElementById('stat-alerts').textContent=data.alerts?data.alerts.length:'--';
  document.getElementById('stat-watch').textContent=data.watchlist_count||'--';
  document.getElementById('status-dot').className='status-dot'+(data.status==='Scanning...'?' scanning':'');
  var leapsEl=document.getElementById('cards-leaps');
  leapsEl.innerHTML=data.leaps&&data.leaps.length?
    data.leaps.map(renderCard).join(''):
    '<div class="empty"><div class="empty-title">No LEAPS setups above threshold right now</div><div style="margin-top:8px;font-size:13px">Try lowering MIN_SCORE in config.py or adding more tickers</div></div>';
  var putsEl=document.getElementById('cards-puts');
  putsEl.innerHTML=data.puts&&data.puts.length?
    data.puts.map(renderCard).join(''):
    '<div class="empty"><div class="empty-title">No naked put setups right now</div><div style="margin-top:8px;font-size:13px">IV rank may be below threshold - best put-selling environments have IVR above 30</div></div>';
  renderAlerts(data.alerts);
}

async function fetchData(){
  try{
    var res=await fetch('/data');
    var data=await res.json();
    render(data);
  }catch(e){
    document.getElementById('header-sub').textContent='Connection error - is scanner.py running?';
  }
}

async function triggerRescan(){
  document.getElementById('loading-bar').style.width='60%';
  document.getElementById('status-dot').className='status-dot scanning';
  await fetch('/rescan',{method:'POST'});
  setTimeout(function(){fetchData();document.getElementById('loading-bar').style.width='0%';},3000);
}

fetchData();
loadBriefing();
setInterval(fetchData,30000);
setInterval(loadBriefing,300000);

// LOG MODAL
var _logData={};
function openLogModal(ticker,type,strike,expiry,mid){
  _logData={ticker:ticker,type:type,strike:strike==='--'?null:strike,expiry:expiry==='--'?null:expiry};
  var label=ticker+' | '+type+(strike&&strike!=='--'?' | $'+strike+(type.indexOf('LEAPS')>=0?'C':'P'):'')+
            (expiry&&expiry!=='--'?' | Exp '+expiry:'');
  document.getElementById('modal-desc').textContent=label;
  document.getElementById('modal-entry').value=mid&&mid!=='--'?mid:'';
  document.getElementById('modal-contracts').value='1';
  document.getElementById('log-modal').classList.add('open');
}
function closeLogModal(){
  document.getElementById('log-modal').classList.remove('open');
  _logData={};
}
async function submitLog(){
  var entry=parseFloat(document.getElementById('modal-entry').value);
  var contracts=parseInt(document.getElementById('modal-contracts').value)||1;
  if(!entry||entry<=0){alert('Enter a valid option entry price');return;}
  var btn=document.getElementById('modal-submit');
  btn.textContent='Saving...';
  try{
    await fetch('/log_position',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(Object.assign({},_logData,{entry_price:entry,contracts:contracts}))});
    closeLogModal();
    btn.textContent='Log it';
  }catch(e){alert('Error saving position');btn.textContent='Log it';}
}

// POSITIONS
async function loadPositions(){
  var el=document.getElementById('cards-positions');
  el.innerHTML='<div class="pos-empty">Loading...</div>';
  try{
    var resp=await fetch('/positions');
    var data=await resp.json();
    renderPositions(data.positions||[]);
  }catch(e){
    el.innerHTML='<div class="pos-empty">Could not load positions</div>';
  }
}
function renderPositions(positions){
  var el=document.getElementById('cards-positions');
  if(!positions.length){
    el.innerHTML='<div class="pos-empty">No logged positions yet.<br>Click "Log trade" on any scanner card to start tracking.</div>';
    return;
  }
  var html='';
  for(var i=0;i<positions.length;i++){
    var p=positions[i];
    var isLeaps=p.type&&p.type.indexOf('LEAPS')>=0;
    var chgPct=p.underlying_chg_pct;
    var chgStr=chgPct!==undefined?(chgPct>=0?'+':'')+chgPct+'%':'--';
    var chgColor=chgPct===undefined?'var(--muted)':(isLeaps?(chgPct>=0?'var(--green)':'var(--red)'):(chgPct<=0?'var(--green)':'var(--red)'));
    var alertHtml='';
    if(isLeaps&&p.entry_underlying&&p.current_underlying){
      var ratio=p.current_underlying/p.entry_underlying;
      if(ratio>=1.5)alertHtml='<div class="pos-alert-scale">Stock up '+Math.round((ratio-1)*100)+'% from entry — may be 3x+ on option. Consider scaling out half.</div>';
      else if(ratio>=1.3)alertHtml='<div class="pos-alert-scale">Stock up '+Math.round((ratio-1)*100)+'% from entry — may be 2x+ on option. Review position.</div>';
    }
    if(!isLeaps&&p.strike&&p.current_underlying){
      var pctAbove=parseFloat(((p.current_underlying-p.strike)/p.strike*100).toFixed(1));
      if(pctAbove<4)alertHtml='<div class="pos-alert-roll">Stock $'+p.current_underlying+' — only '+pctAbove+'% above $'+p.strike+' strike. Urgent: roll or exit.</div>';
      else if(pctAbove<8)alertHtml='<div class="pos-alert-roll">Stock $'+p.current_underlying+' — '+pctAbove+'% above $'+p.strike+' strike. Consider rolling.</div>';
    }
    html+='<div class="pos-card">'+
      '<div class="pos-head">'+
        '<span class="pos-ticker">'+p.ticker+'</span>'+
        '<span class="pos-badge '+(isLeaps?'leaps-badge':'put-badge')+'">'+(isLeaps?'LEAPS':'PUT')+'</span>'+
        '<span class="pos-meta">'+
          (p.strike&&p.strike!=='--'?'$'+p.strike+(isLeaps?'C':'P'):'')+
          (p.expiry&&p.expiry!=='--'?' | '+p.expiry:'')+
          ' | '+p.contracts+' contract'+(p.contracts!==1?'s':'')+
        '</span>'+
      '</div>'+
      '<div class="pos-stats">'+
        '<div class="pos-stat"><div class="lbl">Entry mid</div><div class="val">$'+(p.entry_price||'--')+'</div></div>'+
        '<div class="pos-stat"><div class="lbl">Stock at entry</div><div class="val">$'+(p.entry_underlying||'--')+'</div></div>'+
        '<div class="pos-stat"><div class="lbl">Current stock</div><div class="val" style="color:'+chgColor+'">'+(p.current_underlying?'$'+p.current_underlying:'--')+' ('+chgStr+')</div></div>'+
        '<div class="pos-stat"><div class="lbl">Logged</div><div class="val">'+(p.logged_at||'--')+'</div></div>'+
      '</div>'+
      alertHtml+
      '<div class="pos-footer"><button class="pos-remove" onclick="deletePosition(\''+p.id+'\')">Remove</button></div>'+
    '</div>';
  }
  el.innerHTML=html;
}
async function deletePosition(id){
  if(!confirm('Remove this position?'))return;
  await fetch('/log_position/'+id,{method:'DELETE'});
  loadPositions();
}
</script>

    <div class="modal-desc" id="modal-desc"></div>
    <div class="modal-field">
      <label>Option entry price (mid $)</label>
      <input type="number" id="modal-entry" step="0.01" min="0" placeholder="e.g. 15.50">
    </div>
    <div class="modal-field">
      <label>Contracts</label>
      <input type="number" id="modal-contracts" value="1" min="1">
    </div>
    <div class="modal-row">

      <button onclick="closeLogModal()">Cancel</button>
    </div>

</div>
